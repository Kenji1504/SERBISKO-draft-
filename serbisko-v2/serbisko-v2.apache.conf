<VirtualHost *:80>
    ServerName serbisko.local
    DocumentRoot /home/serbisko/serbisko-v2/public

    <Directory /home/serbisko/serbisko-v2/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/serbisko-error.log
    CustomLog ${APACHE_LOG_DIR}/serbisko-access.log combined
</VirtualHost>
